<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Verified</title>
</head>
<body style="margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; background-color: #f5f5f5;">
    <table width="100%" cellpadding="0" cellspacing="0" style="background-color: #f5f5f5; padding: 20px 0;">
        <tr>
            <td align="center">
                <!-- Main Container -->
                <table width="375" cellpadding="0" cellspacing="0" style="background-color: #ffffff; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1);">
                    
                    <!-- Green Header -->
                    <tr>
                        <td style="background-color: #167A3C; padding: 20px 24px; text-align: left;">
                            <p style="margin: 0; color: #ffffff; font-size: 14px; font-weight: 500;">Order Verified</p>
                        </td>
                    </tr>
                    
                    <!-- Logo -->
                    <tr>
                        <td style="padding: 30px 24px 20px; text-align: center;">
                            <object data="../layout/logo.svg" type="image/svg+xml" width="153" height="43"></object>
                        </td>
                    </tr>
                    
                    <!-- Content -->
                    <tr>
                        <td style="padding: 0 24px 30px;">
                            <h2 style="margin: 0 0 15px 0; font-size: 16px; font-weight: 600; color: #000000;">Hi {{seller_name}},</h2>
                            
                            <p style="margin: 0 0 20px 0; font-size: 14px; color: #333333; line-height: 1.5;">Good news! Order verified and now on its way to your address .</p>
                            
                            <!-- Button -->
                            <table width="100%" cellpadding="0" cellspacing="0">
                                <tr>
                                    <td align="center" style="padding-top: 10px;">
                                        <a href="{{order_tracking_link}}" style="display: inline-block; background-color: #E67E22; color: #ffffff; text-decoration: none; padding: 12px 40px; border-radius: 12px; font-size: 14px; font-weight: 500;">Track Order</a>
                                    </td>
                                </tr>
                            </table>
                        </td>
                    </tr>
                    
        <!-- Footer -->
            <tr>
              <td style="background-color: #eaeaea; padding: 24px">
                <!-- Follow us text -->
                <p
                  style="
                    margin: 0 0 8px 0;
                    font-size: 12px;
                    color: #000000;
                    font-weight: 500;
                  "
                >
                  Follow us on:
                </p>

                <!-- Social icons row -->
              <table
                  cellpadding="0"
                  cellspacing="0"
                  style="margin-bottom: 8px"
                >
                  <tr>
                    <td style="padding-right: 16px">
                      <a href="{{twitter_link}}">
                        <img
                          src="/layout/twitter.png"
                          width="17"
                          height="17"
                          alt="X"
                          style="display: block"
                        />
                      </a>
                    </td>
                    <td style="padding-right: 16px">
                      <a href="{{facebook_link}}">
                        <img
                          src="/layout/facebook.png"
                          width="17"
                          height="17"
                          alt="Facebook"
                          style="display: block"
                        />
                      </a>
                    </td>
                    <td style="padding-right: 16px">
                      <a href="{{instagram_link}}">
                        <img
                          src="/layout/instagram.png"
                          width="17"
                          height="17"
                          alt="Instagram"
                          style="display: block"
                        />
                      </a>
                    </td>
                    <td style="padding-right: 16px">
                      <a href="{{linkedin_link}}">
                        <img
                          src="/layout/linkedin.png"
                          width="17"
                          height="17"
                          alt="LinkedIn"
                          style="display: block"
                        />
                      </a>
                    </td>
                    <td>
                      <a href="{{tiktok_link}}">
                        <img
                          src="/layout/tiktok.png"
                          width="15"
                          height="17"
                          alt="TikTok"
                          style="display: block"
                        />
                      </a>
                    </td>
                  </tr>
                </table>

                <!-- Legal links -->
                <p style="margin: 0; font-size: 11px; color: #666666">
                  <a
                    href="{{privacy_policy_link}}"
                    style="color: #666666; text-decoration: underline"
                    >Privacy Policy</a
                  >
                  &nbsp;&nbsp;
                  <a
                    href="{{terms_link}}"
                    style="color: #666666; text-decoration: underline"
                    >Terms of Service</a
                  >
                </p>
              </td>
            </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
